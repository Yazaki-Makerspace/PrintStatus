<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>3D Lab Printer Status</title>

        <style>
            body {
                font-family: system-ui, sans-serif;
                background: #f5f5f5;
            }

            .printer-card {
                background: white;
                border-radius: 10px;
                margin: 12px;
                padding: 12px;
                box-shadow: 0 2px 5px rgba(0,0,0,.1);
            }

            .row {
                display: grid;
                grid-template-columns: 120px 120px 1fr 150px 120px 150px 40px;
                align-items: center;
                gap: 10px;
            }

            .progress-bar {
                background: #ddd;
                border-radius: 6px;
                overflow: hidden;
                height: 14px;
            }

            .progress-fill {
                background: #4caf50;
                height: 100%;
                transition: width .3s;
            }

            .details {
                display: none;
                grid-template-columns: 1fr 300px;
                gap: 15px;
                margin-top: 12px;
            }

            .details img {
                width: 100%;
                border-radius: 8px;
            }

            .toggle {
                cursor: pointer;
                font-size: 20px;
            }

            /* Timer at the bottom */
            #refresh-timer {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                background: #333;
                color: white;
                text-align: center;
                padding: 10px 0;
                font-size: 16px;
                z-index: 100;
            }
        </style>
    </head>

    <body>

        <h2 style="margin-left:12px;">3D Lab Printer Status</h2>
        <div id="container"></div>

        <!-- Timer at the bottom of the page -->
        <div id="refresh-timer">Next refresh in 60s</div>

        <script>
            let lastData = null;        //Store previous data for comparison to refresh on new data
            let expandedCards = {};     //Track cards that were expanded
            let refreshInterval = 60;   //Refresh every 60 seconds (+ time for github actions)
            let countdown = refreshInterval;

            //
            async function load() {
                const res = await fetch("status.json?_=" + Date.now());
                const printers = await res.json();

                //Comparing new data with last updated data
                const dataStr = JSON.stringify(printers);
                if (lastData === dataStr) return false; //No change. Data has not changed

                //If new data has been uploaded
                lastData = dataStr;

                const c = document.getElementById("container");
                c.innerHTML = "";

                printers.slice(0,7).forEach((p, i) => {
                    const progress = p.pct_progress / 100;
                    const total = progress < 1 ? Math.round(p.min_remaining / (1 - (progress))):100;
                    const id = "d" + i;

                    c.innerHTML += `
                    <div class="printer-card">
                        <div class="row">
                            <span class="toggle" onclick="toggle('${id}')">click</span>
                            <b>${p.printer}</b>
                            <span>${p.status}</span>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width:${p.pct_progress}%"></div>
                            </div>
                            <span>${p.pct_progress}%</span>
                            <span>${p.min_remaining} / ${total} min</span>
                            <span>${p.current_layer_num}/${p.total_layer_num}</span>
                        </div>

                        <div class="details" id="${id}">
                            <div>
                                <div><b>Printer:</b> ${p.printer}</div>
                                <div><b>Status:</b> ${p.status}</div>
                                <div><b>Progress:</b> ${p.pct_progress}%</div>
                                <div><b>Remaining:</b> ${p.min_remaining} min</div>
                                <div><b>Layers:</b> ${p.current_layer_num}/${p.total_layer_num}</div>
                            </div>
                            <img src="printer${i+1}.png?_=${Date.now()}">
                        </div>
                    </div>`;

                    //Restore expanded cards
                    if (expandedCards[id]) {
                        document.getElementById(id).style.display = "grid";
                    }
                });

                return true;
            }

            function tick() {
                const timer = document.getElementById("refresh-timer");
                countdown = countdown - 1;

                if (countdown <= 0) {
                    timer.textContent = "Checking for new data...";
                    load().then(updated => {
                        if (updated) countdown = refreshInterval; //Only reset if new data
                    });
                } else {
                    timer.textContent = `Next refresh in ${countdown}s`;
                }
            }

            function toggle(id) {
                const el = document.getElementById(id);
                el.style.display = el.style.display === "grid" ? "none" : "grid";
                expandedCards[id] = el.style.display === "grid";
            }

            setInterval(tick, 1000); //Repeat loading json and images every 5 sec
            //Initial load
            load();
        </script>
    </body>
</html>
