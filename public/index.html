<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>3D Lab Printer Status</title>

        <style>
            body {
                font-family: system-ui, sans-serif;
                background: #f5f5f5;
                margin: 0;
                padding-bottom: 40px;
            }

            h2 {
                margin-left: 12px;
                font-size: 24px;
            }

            #container {
                margin: 20px;
            }

            .idle h3 {
                background-color: #666;
            }

            .running h3 {
                background-color: green;
            }

            .pause h3 {
                background-color: red;
            }

            .failed h3 {
                background-color: red;
            }

            .finished h3 {
                background-color: #666;
            }

            .printer-row {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
                gap: 30px;
                margin: 10px;
                justify-items: stretch;
            }

            .printer-card {
                display: flex;
                align-items: center;
                background: white;
                border-radius: 10px;
                margin: 0px;
                padding: 10px;
                box-shadow: 0 2px 10px rgba(0,0,0,.1);
                border: 5px solid transparent;
                transition: transform .3s ease-in-out;
                min-width: 350px;
                max-width: 350px;
                flex-wrap: wrap;
            }
            
            .printer-card.idle,
            .printer-card.finish {
                border-color: #666;
            }

            .printer-card.running {
                border-color: green;
            }

            .printer-card.pause,
            .printer-card.failed {
                border-color: red;
            }

            .printer-card .left {
                flex: 1;
                padding-right: 30px;
            }

            .printer-card .right {
                width: 100px;
                height: 100px;
                display: flex;
                justify-content: center;
                align-content: center;
            }

            .progress-bar {
                background: #ddd;
                border-radius: 6px;
                overflow: hidden;
                height: 14px;
                margin-bottom: 10px;
                width: 200px;
            }

            .progress-fill {
                background: #4caf50;
                height: 100%;
                transition: width .3s;
                position: relative;
            }

            .details {
                display: none;
                grid-template-columns: 1fr 300px;
                gap: 15px;
                margin-top: 12px;
            }

            /* Timer at the bottom */
            #refresh-timer {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                background: #333;
                color: white;
                text-align: center;
                padding: 10px 0;
                font-size: 16px;
                z-index: 100;
            }

            #file-input {
                margin: 20px;
            }
        </style>
    </head>

    <body>
        <h2>3D Lab Printer Status</h2>
        
        <div id="container"></div>

        <!-- Timer at the bottom of the page -->
        <div id="refresh-timer">Loading...</div>

        <script>
            let refreshInterval = 60;   // Refresh every 60 seconds (+ time for github actions)
            let timestamp = null;
            let lastTimeStamp = null;
            let nextRefreshTime = null;
            let isPolling = false;

            function load(data_in) {
                //console.log("Loading data...");
                //const res = await fetch("status.json?_=" + Date.now());
                //const printers = await res.json();
                // Comparing timestamps
                timestamp = data_in.timestamp;
                if (lastTimeStamp === timestamp) return false;
                const printers = data_in.printers;
                
                
                const baseTime = parseTimestamp(timestamp);
                const unlockTime = baseTime.getTime() + (refreshInterval * 1000);
                nextRefreshTime = unlockTime;

                // document.getElementById("refresh-timer").textContent = timestamp 
                // ? `Last updated: ${timestamp} | Next refresh at ${nextRefreshTime}s`
                // : `Loading...`;

                const c = document.getElementById("container");
                c.innerHTML = `<div class="printer-row"></div>`;
                const printerRow = c.querySelector(".printer-row");

                printers.forEach((p, i) => {
                    const progress = p.pct_progress / 100;
                    const total = progress < 1 ? Math.round(p.min_remaining / (1 - progress)) : 0;

                    let statusClass = "";
                    if (p.status === "RUNNING") {
                        statusClass = "running";
                    } else if (p.status === "PAUSE" || p.status === "FAILED") {
                        statusClass = "pause"; // PAUSE + FAILED
                    } else {
                        statusClass = "idle"; // IDLE + FINISH
                    }

                    // const printerCardClass = status.toLowerCase(); // Dynamically add class based on status
                    // const printerRow = document.querySelector(`#${status.toLowerCase()}-section .printer-row`);
                    printerRow.innerHTML += `
                        <div class="printer-card ${statusClass}">
                            <div class="left">
                                <div><b>Printer:</b> ${p.printer}</div>
                                <div><b>Status:</b> ${p.status}</div>
                                <div class="progress-bar">
                                    <div class="progress-fill" style="width:${p.pct_progress}%">
                                        <span style="font-size: 10px; color: black; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);">${p.pct_progress}%</span>
                                    </div>
                                </div>
                                <div><b>Remaining min.:</b> ${p.min_remaining} / ${total} min</div>
                                <div><b>Layers:</b> ${p.current_layer_num}/${p.total_layer_num}</div>
                                <div><b>Nozzle:</b> ${p.nozzle_temp} / ${p.target_nozzle_temp}°C</div>
                                <div><b>Bed:</b> ${p.bed_temp} / ${p.target_bed_temp}°C</div>
                            </div>
                            <div class="right">
                                <img src="printer${i+1}.png?_=${Date.now()}" alt="Printer Image">
                            </div>
                        </div>
                    `;

                // Add printers to the section
                // filteredPrinters.forEach((p, i) => {
                //     const progress = p.pct_progress / 100;
                //     const total = progress < 1 ? Math.round(p.min_remaining / (1 - progress)) : 0;

                //     const printerCardClass = status.toLowerCase(); // Dynamically add class based on status
                //     const printerRow = document.querySelector(`#${status.toLowerCase()}-section .printer-row`);

                //     printerRow.innerHTML += `
                //         <div class="printer-card ${printerCardClass}">
                //             <div class="left">
                //                 <div><b>Printer:</b> ${p.printer}</div>
                //                 <div><b>Status:</b> ${p.status}</div>
                //                 <div class="progress-bar">
                //                     <div class="progress-fill" style="width:${p.pct_progress}%">
                //                         <span style="font-size: 10px; color: black; position: absolute; left: 50%; transform: translateX(-50%); top: 50%; transform: translateY(-50%);">${p.pct_progress}%</span>
                //                     </div>
                //                 </div>
                //                 <div><b>Minutes:</b> ${p.min_remaining} / ${total} min</div>
                //                 <div><b>Layers:</b> ${p.current_layer_num}/${p.total_layer_num}</div>
                //                 <div><b>Nozzle:</b> ${p.nozzle_temp} / ${p.target_nozzle_temp}°C</div>
                //                 <div><b>Bed:</b> ${p.bed_temp} / ${p.target_bed_temp}°C</div>
                //             </div>
                //             <div class="right">
                //                 <img src="printer${i+1}.png?_=${Date.now()}" alt="Printer Image">
                //             </div>
                //         </div>`;
                // });
                });
                // If new data has been uploaded
                lastTimeStamp = timestamp;
                return true;
            }

            function parseTimestamp(str) {
                // Expected: "MM/DD/YYYY HH:MM:SS AM/PM"
                const [datePart, timePart, meridiem] = str.split(" ");

                const [month, day, year] = datePart.split("/").map(Number);
                let [hour, minute, second] = timePart.split(":").map(Number);

                if (meridiem === "PM" && hour !== 12) hour += 12;
                if (meridiem === "AM" && hour === 12) hour = 0;

                return new Date(year, month - 1, day, hour, minute, second);
            }

            async function pollForUpdate() {
                while (true) {
                    try {
                        const res = await fetch("status.json?_=" + Date.now());
                        const data = await res.json();

                        const updated = load(data);

                        if (updated) {
                            updateNextRefreshTime();
                            isPolling = false;
                            return;
                        }
                    } catch (err) {
                        console.error(err);
                    }

                    await new Promise(r => setTimeout(r, 1000));
                }
            }

            function updateNextRefreshTime() {
                if (!timestamp) return;

                const baseTime = parseTimestamp(timestamp);
                nextRefreshTime = baseTime.getTime() + refreshInterval * 1000;
            }

            // Timer to update the refresh counter and load new data
            function tick() {
                const timer = document.getElementById("refresh-timer");

                if (!timestamp || !nextRefreshTime) {
                    timer.textContent = "Loading...";
                    return;
                }

                const now = Date.now();

                if (now < nextRefreshTime) {
                    const secondsLeft = Math.ceil((nextRefreshTime - now) / 1000);
                    timer.textContent = `Last updated: ${timestamp} | Next refresh at ${nextRefreshTime}s`;
                    return;
                }

                timer.textContent = `Last updated: ${timestamp} | Checking for updates...`;

                // Once unlocked, just keep checking until new data arrives
                if (!isPolling) {
                    isPolling = true;
                    pollForUpdate();
                }
            }

            setInterval(tick, 1000); // Repeat loading json and images every second
            // Initial load
            async function init() {
                try {
                    const res = await fetch("status.json?_=" + Date.now());
                    const data = await res.json();
                    load(data);
                } catch (err) {
                    console.error(err);
                }
            }

            init();
            //load();
        </script>
    </body>
</html>
